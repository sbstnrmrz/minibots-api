services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_DB: minibots 
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234   # local only, not production
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d minibots"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
